function gS(n){if(SM[n])return SM[n];for(const[k,v]of Object.entries(SM))if(n.includes(k)||k.includes(n))return v;return null}
function mo(ss){const li=ss.some(x=>x.isLimit)?30:0;const avg=ss.reduce((t,x)=>t+x.change,0)/ss.length;const mx=Math.max(...ss.map(x=>x.amt||0));return Math.round(Math.min(Math.min(avg*4,40)+Math.min(mx/5e11,1)*30+li,100))}
function mL(n){return n>=80?"л§Өмҡ°к°•н•Ё":n>=60?"к°•н•Ё":n>=40?"ліҙнҶө":"м•Ҫн•Ё"}
function mC(n){return n>=80?"#E53935":n>=60?"#FF7043":n>=40?"#FF9800":"#aaa"}

let allS=[],secMap={};
// л°ұн…ҢмҠӨнҠё лӮ м§ң л„Өл№„кІҢмқҙн„° мғҒнғң
let _btData=null,_btDates=[],_btIdx=0;

function st(t,b){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));b.classList.add('on');['s','v','r','b'].forEach(id=>document.getElementById('t'+id).style.display=t===id?'block':'none')}

async function load(){
  const btn=document.getElementById('rbtn');
  btn.disabled=true;btn.textContent='вҸі';
  document.getElementById('ts').innerHTML='<div class="spin"><div class="spinner"></div><div style="color:#aaa;font-size:13px">н•ңнҲ¬API лЎңл”©мӨ‘...</div></div>';
  try{
    const res=await fetch(API+'?t='+Date.now());
    const d=await res.json();
    if(!d.ok)throw new Error(d.error||'APIмҳӨлҘҳ');
    const seen=new Set();allS=[];
    for(const s of[...(d.limitUp||[]),...(d.topRising||[]),...(d.topVolume||[])]){if(!seen.has(s.code)){seen.add(s.code);allS.push(s);}}
    secMap={};
    for(const s of allS){const sec=gS(s.name);if(sec){if(!secMap[sec])secMap[sec]=[];secMap[sec].push(s);}}
    const now=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    const kp=d.debug?.kospi||0,kq=d.debug?.kosdaq||0,gj=d.debug?.gainJ||0,gk=d.debug?.gainKQ||0;
    document.getElementById('hsub').innerHTML=`<span class="live"></span>${d.date} В· кұ°лһҳлҢҖкёҲмҪ”мҠӨн”ј${kp}/мҪ”мҠӨлӢҘ${kq} л“ұлқҪлҘ мҪ”мҠӨн”ј${gj}/мҪ”мҠӨлӢҘ${gk} В· ${now}`;
    rS(d);rV(d);rR(d);
    if(d._token)rHist(d._token);else{try{const r=await fetch(HIST+'?t='+Date.now());const hd=await r.json();if(hd.ok){_btData=hd;renderBT();}}catch(e){}}
  }catch(e){
    document.getElementById('ts').innerHTML=`<div style="background:#fff3e0;border-radius:14px;padding:16px;color:#e65100">вҡ пёҸ ${e.message}</div>`;
  }
  btn.disabled=false;btn.textContent='рҹ”„ мғҲлЎңкі м№Ё';
}

async function rHist(tk){
  try{
    const r=await fetch(HIST+'?token='+encodeURIComponent(tk)+'&t='+Date.now());
    const d=await r.json();
    if(d.ok){_btData=d;renderBT();}
  }catch(e){}
}

/* в”Җв”Җв”Җ м„№н„° нғӯ в”Җв”Җв”Җ */
function rS(d){
  const ri=allS.filter(s=>s.change>0);
  const lc=(d.limitUp||[]).length;
  const tv=d.topVolume||[];
  const avg=tv.length?tv.reduce((a,s)=>a+s.change,0)/tv.length:0;
  const mood=avg>0.3?'мғҒмҠ№м„ё':avg<-0.3?'н•ҳлқҪм„ё':'нҳјмЎ°м„ё';
  const mc=avg>0.3?'up':avg<-0.3?'dn':'fl';
  const secs=Object.entries(secMap).map(([nm,ss])=>{
    const rs=[...ss].filter(s=>s.change>0).sort((a,b)=>b.isLimit-a.isLimit||b.change-a.change);
    if(!rs.length)return null;
    const m=mo(rs);return{nm,ss:rs,m,c:SC[nm]||'#9E9E9E',hl:rs.some(s=>s.isLimit)};
  }).filter(Boolean).filter(s=>s.m>0).sort((a,b)=>b.m-a.m);
  let h=`<div class="stat-row"><div class="stat"><div class="sl">мһҘ л¶„мң„кё°</div><div class="sv ${mc}">${mood}</div></div><div class="stat"><div class="sl">мғҒмҠ№ мў…лӘ©</div><div class="sv up">${ri.length}к°ң</div></div><div class="stat"><div class="sl">мғҒн•ңк°Җ</div><div class="sv ${lc>0?'up':'fl'}">${lc}к°ң</div></div></div>`;
  if(!secs.length){h+=`<div class="empty"><div style="font-size:36px;margin-bottom:12px">рҹ“ү</div><div style="font-size:16px;font-weight:700;color:#555">мЈјлҸ„м„№н„° м—ҶмқҢ</div><div style="font-size:13px;color:#aaa;margin-top:6px">м „л°ҳм Ғ н•ҳлқҪмһҘ лҳҗлҠ” мһҘ л§Ҳк°җ нӣ„</div></div>`;}
  else{
    h+=`<div class="sec-hd">мғҒмҠ№ мЈјлҸ„м„№н„° <span class="pill">${secs.length}к°ң</span></div>`;
    for(const sec of secs){
      const ci=2*Math.PI*22,pr=(sec.m/100)*ci,mc2=mC(sec.m);
      let rows='';['рҹҘҮ','рҹҘҲ','рҹҘү'].forEach((md,i)=>{if(sec.ss[i])rows+=sRow(sec.ss[i],sec.ss[i].isLimit?'рҹ”ҙ':md);});
      let more='';const rest=sec.ss.slice(3);
      if(rest.length){more=`<button class="mbtn" onclick="toggleMore(this)">в–ј +${rest.length}мў…лӘ©</button><div style="display:none">`;rest.forEach(s=>{more+=sRow(s,'В·');});more+='</div>';}
      h+=`<div class="scard"><div class="scard-hd"><div class="sbar" style="background:${sec.c}"></div><div class="sinfo"><div class="sname">${sec.nm}${sec.hl?'<span class="lbadge">мғҒн•ңк°Җ</span>':''}</div><div class="ssub">${sec.ss.length}мў…лӘ©В·${mL(sec.m)}</div></div><div class="ring-w"><svg width="54" height="54" viewBox="0 0 54 54" style="transform:rotate(-90deg)"><circle cx="27" cy="27" r="22" fill="none" stroke="#f0f0f0" stroke-width="4"/><circle cx="27" cy="27" r="22" fill="none" stroke="${mc2}" stroke-width="4" stroke-dasharray="${ci.toFixed(1)}" stroke-dashoffset="${(ci-pr).toFixed(1)}" stroke-linecap="round"/></svg><div style="margin-top:-38px;margin-bottom:6px"><div class="ring-sc" style="color:${mc2}">${sec.m}</div></div><div class="ring-lb">${mL(sec.m)}</div></div></div><div class="slist">${rows}${more}</div></div>`;
    }
  }
  h+=`<div class="foot">м¶ңмІҳ: н•ңкөӯнҲ¬мһҗмҰқк¶Ң OpenAPI</div>`;
  document.getElementById('ts').innerHTML=h;
}

function qB(s){return s.market==='Q'?'<span class="qbadge">Q</span>':''}
function sRow(s,rk){const cc=s.change>0?'up':s.change<0?'dn':'fl';const cs=(s.change>0?'+':'')+s.change.toFixed(2)+'%';return `<div class="srow" onclick="showStock('${s.code}')"><span class="srk">${rk}</span><span class="sn">${s.name}${qB(s)}</span><div class="sr"><div class="sp">${s.price.toLocaleString()}мӣҗ</div><div class="sc ${cc}">${cs}</div>${s.amtFmt?`<div class="sa">${s.amtFmt}</div>`:''}</div></div>`;}

/* в”Җв”Җв”Җ кұ°лһҳлҢҖкёҲ нғӯ в”Җв”Җв”Җ */
function rV(d){
  const lst=(d.topVolume||[]).slice(0,40);
  let h=`<div class="sec-hd">кұ°лһҳлҢҖкёҲ мғҒмң„ <span class="pill">${lst.length}к°ң</span></div>`;
  lst.forEach((s,i)=>{
    const sec=gS(s.name)||'кё°нғҖ',sc2=SC[sec]||'#ccc';
    const cc=s.change>0?'up':s.change<0?'dn':'fl';
    const cs=(s.change>0?'+':'')+s.change.toFixed(2)+'%';
    h+=`<div class="vrow" onclick="showStock('${s.code}')"><div class="vrk">${i+1}</div><div class="vi"><div class="vn">${s.name}${s.isLimit?' рҹ”ҙ':''}${qB(s)}</div><div class="vsec" style="color:${sc2}">в—Ҹ ${sec}</div><div class="va">${s.amtFmt}</div></div><div class="vr"><div class="vc ${cc}">${cs}</div><div class="vp">${s.price.toLocaleString()}мӣҗ</div></div></div>`;
  });
  h+=`<div class="foot">мҪ”мҠӨн”ј+мҪ”мҠӨлӢҘ кұ°лһҳлҢҖкёҲ лӮҙлҰјм°ЁмҲң</div>`;
  document.getElementById('tv').innerHTML=h;
}

/* в”Җв”Җв”Җ л“ұлқҪлҘ  нғӯ вҖ” gainRanking(кұ°лһҳлҢҖкёҲ л¬ҙкҙҖ) мӮ¬мҡ© в”Җв”Җв”Җ */
function rR(d){
  // gainRanking = chgrate-rank API кІ°кіј (кұ°лһҳлҢҖкёҲ л¬ҙкҙҖ мҲңмҲҳ л“ұлқҪлҘ )
  // fallback: limitUp + topRising н•©мӮ°
  let lst = d.gainRanking || [];
  // gainRankingмқҖ л°ұм—”л“ңм—җм„ң мқҙлҜё 100м–ө+ н•„н„° + л“ұлқҪлҘ  м •л ¬ мҷ„лЈҢ
  if(!lst.length){
    // мөңнӣ„ fallback
    lst=[...(d.topVolume||[])].filter(s=>s.change>0&&(s.amt||0)>=10000000000).sort((a,b)=>b.isLimit-a.isLimit||b.change-a.change);
  }

  const isApi=d.debug?.gainSrc==='api';
  const srcLabel=isApi?'в—Ҹ chgrate API (кұ°лһҳлҢҖкёҲл¬ҙкҙҖ)':'в—Ҹ кұ°лһҳлҢҖкёҲ 100м–ө+ л“ұлқҪлҘ мҲң';
  let h=`<div class="sec-hd">л“ұлқҪлҘ  мғҒмң„ <span class="pill">${lst.length}к°ң</span><span style="font-size:10px;color:${isApi?'#16a34a':'#1565C0'}">${srcLabel}</span></div>`;

  if(!lst.length){
    h+=`<div class="empty"><div style="font-size:28px;margin-bottom:10px">рҹ“ү</div><div style="font-weight:700;color:#555">мғҒмҠ№ мў…лӘ© м—ҶмқҢ</div></div>`;
  }else{
    lst.slice(0,100).forEach((s,i)=>{
      const sec=gS(s.name)||'кё°нғҖ',sc2=SC[sec]||'#ccc';
      h+=`<div class="vrow" onclick="showStock('${s.code}')"><div class="vrk">${i+1}</div><div class="vi"><div class="vn">${s.name}${s.isLimit?' рҹ”ҙ':''}${qB(s)}</div><div class="vsec" style="color:${sc2}">в—Ҹ ${sec}</div><div class="va">${s.amtFmt||''}</div></div><div class="vr"><div class="vc up">+${s.change.toFixed(2)}%</div><div class="vp">${s.price.toLocaleString()}мӣҗ</div></div></div>`;
    });
  }
  h+=`<div class="foot">мғҒн•ңк°Җ мҡ°м„  В· л“ұлқҪлҘ  лӮҙлҰјм°ЁмҲң В· мҪ”мҠӨн”ј+мҪ”мҠӨлӢҘ</div>`;
  document.getElementById('tr').innerHTML=h;
}

/* в”Җв”Җв”Җ л°ұн…ҢмҠӨнҠё нғӯ + лӮ м§ң л„Өл№„кІҢмқҙн„° в”Җв”Җв”Җ */
function renderBT(){
  const d=_btData;
  if(!d){document.getElementById('tb').innerHTML='<div class="spin"><div class="spinner"></div></div>';return;}
  const bt=d.backtest||[];
  _btDates=bt.map(x=>x.date).filter(Boolean);
  if(_btIdx<0)_btIdx=0;
  if(_btIdx>=_btDates.length)_btIdx=_btDates.length-1;

  const vl=bt.filter(x=>x.topSector&&x.nextDayReturn!==null);
  const won=vl.filter(x=>x.nextDayReturn>0);
  const lost=vl.filter(x=>x.nextDayReturn<=0);
  const wr=vl.length?Math.round(won.length/vl.length*100):0;
  const tavg=vl.length?vl.reduce((a,x)=>a+x.nextDayReturn,0)/vl.length:0;
  const aw=won.length?won.reduce((a,x)=>a+x.nextDayReturn,0)/won.length:0;
  const al=lost.length?lost.reduce((a,x)=>a+x.nextDayReturn,0)/lost.length:0;
  const fp=n=>(n>=0?'+':'')+n.toFixed(2)+'%';

  const sm={};
  for(const x of bt){if(!x.topSector||x.nextDayReturn===null)continue;if(!sm[x.topSector])sm[x.topSector]={w:0,t:0,s:0};sm[x.topSector].t++;sm[x.topSector].s+=x.nextDayReturn;if(x.nextDayReturn>0)sm[x.topSector].w++;}
  const ss=Object.entries(sm).map(([s,v])=>({s,wr:Math.round(v.w/v.t*100),avg:+(v.s/v.t).toFixed(2),n:v.t})).sort((a,b)=>b.wr-a.wr);

  // лӮ м§ң л„Өл№„кІҢмқҙн„°
  const curDate=_btDates[_btIdx]||'';
  const dispDate=curDate?curDate.slice(0,4)+'.'+curDate.slice(4,6)+'.'+curDate.slice(6):'';
  const calVal=curDate?curDate.slice(0,4)+'-'+curDate.slice(4,6)+'-'+curDate.slice(6):'';

  let h=`
  <div class="date-nav">
    <div class="date-nav-top">
      <div class="date-nav-title">рҹ“… мқјмһҗлі„ мЈјлҸ„м„№н„°</div>
      <div class="date-cal">
        <input type="date" class="date-input" id="dateInput" value="${calVal}" min="2026-01-02" onchange="onDateInput(this.value)">
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between">
      <button class="dnbtn" onclick="moveDt(-1)" ${_btIdx<=0?'disabled':''}>в—Җ мқҙм „</button>
      <div class="date-disp">${dispDate}</div>
      <button class="dnbtn" onclick="moveDt(1)" ${_btIdx>=_btDates.length-1?'disabled':''}>лӢӨмқҢ в–¶</button>
    </div>
  </div>`;

  // м„ нғқлҗң лӮ м§ң мғҒм„ё
  if(curDate){
    const row=bt.find(x=>x.date===curDate);
    if(row){
      const tops=row.topSectors||[];
      const hasNext=row.nextDayReturn!==null;
      const w=hasNext&&row.nextDayReturn>0;
      h+=`<div class="date-detail">
        <div class="date-detail-hd">${dispDate} мЈјлҸ„м„№н„° нҳ„нҷ©</div>`;
      if(tops.length){
        const medals=['рҹҘҮ','рҹҘҲ','рҹҘү','4пёҸвғЈ','5пёҸвғЈ'];
        tops.forEach((t,i)=>{
          const c=SC[t.sector]||'#888';
          const nr=row.topSectors?.length?row.nextDayReturn:null;
          h+=`<div class="dd-sec">
            <div class="dd-rank">${medals[i]||'В·'}</div>
            <div class="dd-info">
              <div class="dd-name" style="color:${c}">${t.sector}</div>
              <div class="dd-leader">лҢҖмһҘ: ${t.leader||'-'} (+${(t.leaderChange||0).toFixed(2)}%)</div>
            </div>
            <div class="dd-avg">
              <div class="dd-av up">+${(t.avg||0).toFixed(2)}%</div>
              ${i===0&&hasNext?`<div class="dd-next ${w?'up':'dn'}">${w?'в–І':'в–ј'}лӢӨмқҢлӮ  ${fp(nr)}</div>`:''}
            </div>
          </div>`;
        });
      }else{
        h+=`<div style="font-size:13px;color:#aaa;padding:8px 0">лҚ°мқҙн„° м—ҶмқҢ</div>`;
      }
      h+=`</div>`;
    }
  }

  // м „мІҙ нҶөкі„
  h+=`<div class="stat-row">
    <div class="stat"><div class="sl">м „мІҙмҠ№лҘ </div><div class="sv up">${wr}%</div><div style="font-size:11px;color:#aaa">${won.length}мҠ№${lost.length}нҢЁ</div></div>
    <div class="stat"><div class="sl">нҸүк· мҲҳмқө</div><div class="sv ${tavg>=0?'up':'dn'}">${fp(tavg)}</div></div>
    <div class="stat"><div class="sl">л¶„м„қмқјмҲҳ</div><div class="sv">${vl.length}мқј</div></div>
  </div>
  <div class="sec-hd">м„№н„°лі„ м„ұкіј <span class="pill">${ss.length}к°ң</span></div>
  <div class="bt-card">`;
  for(const s of ss){const fl=s.wr>=60?'#E53935':s.wr>=40?'#FF9800':'#2563a8';h+=`<div class="sp-row"><span style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.s}</span><div class="sp-bw"><div class="sp-bf" style="width:${s.wr}%;background:${fl}"></div></div><span style="font-weight:800;color:${fl}">${s.wr}%</span><span style="color:${s.avg>=0?'#E53935':'#2563a8'};font-weight:700">${fp(s.avg)}</span><span style="color:#aaa">${s.n}нҡҢ</span></div>`;}
  h+=`</div>
  <div class="sec-hd">кұ°лһҳ лЎңк·ё <span class="pill">мөңмӢ мҲң</span></div>
  <div class="bt-card"><div class="bt-hdr"><span>лӮ м§ң</span><span>м„№н„°</span><span>лӢ№мқј%</span><span style="text-align:right">лӢӨмқҢлӮ </span><span style="text-align:center">кІ°кіј</span></div><div style="max-height:300px;overflow-y:auto">`;
  for(const x of[...bt].reverse()){
    if(!x.topSector)continue;
    const hr=x.nextDayReturn!==null,w=hr&&x.nextDayReturn>0;
    const ds=x.date?x.date.slice(4,6)+'.'+x.date.slice(6):'';
    const isCur=x.date===curDate;
    // мқёлқјмқё м„№н„° мғҒм„ё
    const tops2=(x.topSectors||[]).slice(0,5);
    let detailHtml='';
    const medals2=['рҹҘҮ','рҹҘҲ','рҹҘү','4пёҸвғЈ','5пёҸвғЈ'];
    tops2.forEach((t,i)=>{
      const c2=SC[t.sector]||'#888';
      detailHtml+=`<div class="dd-row"><span style="font-size:13px">${medals2[i]}</span><span style="font-weight:700;color:${c2};flex:1">${t.sector}</span><span style="color:#aaa">${t.leader||'-'}</span><span style="color:#E53935;font-weight:700;margin-left:6px">+${(t.avg||0).toFixed(2)}%</span></div>`;
    });
    if(!detailHtml)detailHtml=`<div style="color:#aaa;font-size:11px">лҚ°мқҙн„°м—ҶмқҢ</div>`;
    h+=`<div class="bt-rw${isCur?' expanded':''}" style="${isCur?'background:#FFF3F3;':''}" onclick="this.classList.toggle('expanded');jumpToDate('${x.date}')">
      <div class="bt-rw-top">
        <span style="color:${isCur?'#E53935':'#aaa'};font-weight:${isCur?800:400}">${ds}</span>
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;color:${SC[x.topSector]||'#555'}">${x.topSector}</span>
        <span style="text-align:right;font-weight:700;color:${hr?(w?'#E53935':'#2563a8'):'#ccc'}">${hr?fp(x.nextDayReturn):'-'}</span>
        <span style="text-align:center">${hr?`<span class="tag ${w?'tu':'td'}">${w?'мҠ№':'нҢЁ'}</span>`:'-'}</span>
      </div>
      <div class="bt-detail">${detailHtml}</div>
    </div>`;
  }
  h+=`</div></div><div class="foot">н•ңкөӯнҲ¬мһҗмҰқк¶Ң OpenAPI В· мӢӨм ң мў…к°Җ кё°мӨҖ В· 2026.01~</div>`;
  document.getElementById('tb').innerHTML=h;
}

function moveDt(dir){
  _btIdx=Math.max(0,Math.min(_btDates.length-1,_btIdx+dir));
  renderBT();
  // лЎңк·ё мҠӨнҒ¬лЎӨ
  setTimeout(()=>{const cur=document.querySelector('.bt-rw[style*="FFF3F3"]');if(cur)cur.scrollIntoView({block:'nearest'});},100);
}

function jumpToDate(date){
  const idx=_btDates.indexOf(date);
  if(idx>=0){_btIdx=idx;renderBT();}
}

function onDateInput(val){
  if(!val)return;
  const d=val.replace(/-/g,'');
  // к°ҖмһҘ к°Җк№Ңмҡҙ кұ°лһҳмқј м°ҫкё°
  let best=-1,bestDiff=Infinity;
  _btDates.forEach((dt,i)=>{const diff=Math.abs(+dt-+d);if(diff<bestDiff){bestDiff=diff;best=i;}});
  if(best>=0){_btIdx=best;renderBT();}
}

/* в”Җв”Җв”Җ мў…лӘ© л¶„м„қ лӘЁлӢ¬ в”Җв”Җв”Җ */
function showStock(code){
  const s=allS.find(x=>x.code===code);if(!s)return;
  const sec=gS(s.name)||'кё°нғҖ',sc2=SC[sec]||'#888';
  const secSs=(secMap[sec]||[]).filter(x=>x.change>0);
  const ki=cKi(s,secSs),mat=cMat(s,secSs),thm=cThm(sec,secSs),vol=cVol(s);
  const kiL=ki>=80?'н•«рҹ”Ҙ':ki>=60?'к°•м„ё':ki>=40?'мЈјлӘ©':'кҙҖл§қ';
  const matL=mat>=80?'к°•н•ңмһ¬лЈҢ':mat>=60?'мң нҡЁмһ¬лЈҢ':mat>=40?'ліҙнҶө':'м•Ҫн•Ё';
  const thmL=thm>=80?'м„№н„°м—ҙн’Қ':thm>=60?'к°•н•ңн…Ңл§Ҳ':thm>=40?'ліҙнҶө':'м•Ҫн•Ё';
  const volL=vol>=80?'нҸӯл°ң':vol>=60?'к°•н•Ё':vol>=40?'ліҙнҶө':'м•Ҫн•Ё';
  const checks=cCL(s,secSs,sec);const pass=checks.filter(c=>c.p).length;
  const cc=s.change>0?'up':s.change<0?'dn':'fl';const cs=(s.change>0?'+':'')+s.change.toFixed(2)+'%';
  let h=`<div class="bs-hd"><div><div class="bs-nm">${s.name}</div><div class="bs-cd">${s.code}</div><span class="bs-sec" style="background:${sc2}20;color:${sc2}">${sec}</span></div><div class="bs-pw"><div class="bs-pr">${s.price.toLocaleString()}<span style="font-size:14px;font-weight:600;color:#888">мӣҗ</span></div><div class="bs-ch ${cc}">${cs}</div><div class="bs-am">${s.amtFmt||''}</div></div></div>
  <div class="bs-metrics">${mCard('лҒјм җмҲҳ',ki,kiL,mC(ki),'лӘЁл©ҳн…ҖВ·к°•лҸ„')}${mCard('мһ¬лЈҢк°•лҸ„',mat,matL,mC(mat),'мғҒмҠ№мһ¬лЈҢ')}${mCard('м„№н„°н…Ңл§Ҳ',thm,thmL,mC(thm),'н…Ңл§Ҳк°•лҸ„')}${mCard('кұ°лһҳк°•лҸ„',vol,volL,mC(vol),'кұ°лһҳлҢҖкёҲ')}</div>
  <div class="bs-sec2"><div class="bs-st">вң… мў…к°Җл§ӨмҲҳ мІҙнҒ¬лҰ¬мҠӨнҠё <span style="font-size:12px;color:${pass>=4?'#E53935':pass>=3?'#FF9800':'#888'};font-weight:700">${pass}/5 нҶөкіј</span></div>`;
  for(const c of checks){h+=`<div class="ci"><div class="ci-ic ${c.p?'pass':'fail'}">${c.p?'вң“':'вң—'}</div><div style="flex:1"><div class="ci-tx" style="color:${c.p?'#111':'#aaa'}">${c.l}</div><div class="ci-nt">${c.n}</div></div></div>`;}
  h+=`</div><div class="bs-sec2"><div class="bs-st">рҹ“° кҙҖл Ё лүҙмҠӨ В· кіөмӢң</div>
  <a class="nws-btn" href="https://finance.naver.com/item/news.naver?code=${s.code}" target="_blank"><span style="font-size:20px">рҹ“Ҡ</span><span style="font-size:13px;font-weight:700;flex:1">${s.name} лүҙмҠӨ</span><span style="font-size:14px;color:#bbb">вҶ’</span></a>
  <a class="nws-btn" href="https://dart.fss.or.kr/dsab001/main.do?autoSearch=true&textCrpNm=${encodeURIComponent(s.name)}" target="_blank"><span style="font-size:20px">рҹ“Ӣ</span><span style="font-size:13px;font-weight:700;flex:1">DART кіөмӢң</span><span style="font-size:14px;color:#bbb">вҶ’</span></a>
  <a class="nws-btn" href="https://finance.naver.com/item/main.naver?code=${s.code}" target="_blank"><span style="font-size:20px">рҹ“Ҳ</span><span style="font-size:13px;font-weight:700;flex:1">м°ЁнҠёВ·мһ¬л¬ҙл¶„м„қ</span><span style="font-size:14px;color:#bbb">вҶ’</span></a>
  </div>`;
  document.getElementById('bsCnt').innerHTML=h;
  document.getElementById('ovl').classList.add('show');
  document.getElementById('bsht').classList.add('show');
}

function mCard(lb,sc,tx,cl,ds){return `<div class="mc"><div class="mc-lb">${lb}</div><div class="mc-vl" style="color:${cl}">${sc}</div><div class="mc-bw"><div class="mc-bf" style="width:${sc}%;background:${cl}"></div></div><div class="mc-ds">${tx}В·${ds}</div></div>`;}
function cKi(s,ss){let sc=Math.min(Math.max(s.change*4,0),40);if(s.isLimit)sc+=30;sc+=Math.min((s.amt||0)/5e11,1)*20;if(ss.length>=3)sc+=10;return Math.round(Math.min(sc,100));}
function cMat(s,ss){let sc=Math.min(Math.max(s.change*3.5,0),35);if(s.isLimit)sc+=25;sc+=Math.min(ss.length*8,24);sc+=Math.min((s.amt||0)/1e12,1)*16;return Math.round(Math.min(sc,100));}
function cThm(sec,ss){if(!ss.length)return 10;const avg=ss.reduce((a,s)=>a+s.change,0)/ss.length;let sc=Math.min(avg*5,40)+Math.min(ss.length*10,40);if(ss.some(s=>s.isLimit))sc+=20;return Math.round(Math.min(sc,100));}
function cVol(s){return Math.round(Math.min(Math.min((s.amt||0)/1e12,1)*80+Math.min(Math.max(s.change,0)*2,20),100));}
function cCL(s,ss,sec){const isLdr=ss[0]?.code===s.code;return[{p:s.change>0,l:'м–‘лҙү мғҒмҠ№ нҷ•мқё',n:s.change>0?`+${s.change.toFixed(2)}% мғҒмҠ№`:'н•ҳлқҪ'},{p:(s.amt||0)>=5e9,l:'кұ°лһҳлҢҖкёҲ 50м–ө+',n:`${s.amtFmt||'0'} ${(s.amt||0)>=5e9?'вң“':'вң—'}`},{p:ss.length>=2,l:'м„№н„° лҸҷл°ҳ мғҒмҠ№',n:ss.length>=2?`${sec} ${ss.length}мў…лӘ© лҸҷл°ҳ`:'лҸҷл°ҳм—ҶмқҢ'},{p:s.change>=2,l:'к°•н•ңл“ұлқҪлҘ  2%+',n:`${s.change>=0?'+':''}${s.change.toFixed(2)}% ${s.change>=2?'вң“':'вң—'}`},{p:s.isLimit||isLdr,l:'мЈјлҸ„мЈј/мғҒн•ңк°Җ',n:s.isLimit?'мғҒн•ңк°Җрҹ”ҙ':isLdr?`${sec} 1мң„лҢҖмһҘмЈј`:'м¶”мў…мЈј'}];}
function closeBS(){document.getElementById('ovl').classList.remove('show');document.getElementById('bsht').classList.remove('show');}
function toggleMore(btn){const el=btn.nextElementSibling;const show=el.style.display==='none';el.style.display=show?'block':'none';btn.textContent=show?'в–І м ‘кё°':`в–ј +${el.querySelectorAll('.srow').length}мў…лӘ©`;}
load();
</script>
