<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>주도섹터 대시보드</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#F0F2F5;color:#111;overscroll-behavior:none}
.app{max-width:480px;margin:0 auto;min-height:100vh;position:relative}
.hd{background:#fff;border-bottom:1px solid rgba(0,0,0,.06);position:sticky;top:0;z-index:100}
.hd-in{padding:14px 16px 0}
.hd-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.hd-ttl{font-size:22px;font-weight:900;letter-spacing:-.8px}
.hd-sub{font-size:11px;color:#aaa;margin-top:3px;display:flex;align-items:center;gap:5px}
.live{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:bk 1.5s ease-in-out infinite}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.3}}
.rbtn{background:#E53935;color:#fff;border:none;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.rbtn:active{transform:scale(.95)}.rbtn:disabled{background:#ddd;color:#aaa}
.tabs{display:flex}
.tab{flex:1;padding:11px 0;border:none;background:transparent;font-size:12.5px;font-weight:600;color:#bbb;cursor:pointer;border-bottom:2.5px solid transparent;transition:color .15s,border-color .15s}
.tab.on{color:#111;border-bottom-color:#E53935}
.cnt{padding:12px;padding-bottom:48px}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat{background:#fff;border-radius:12px;padding:12px}
.sl{font-size:11px;color:#aaa;margin-bottom:3px}
.sv{font-size:18px;font-weight:800}
.up{color:#E53935}.dn{color:#1565C0}.fl{color:#888}.sec-hd{font-size:12px;color:#aaa;font-weight:700;padding:0 4px 8px;display:flex;justify-content:space-between;align-items:center}
.pill{background:#111;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.scard{background:#fff;border-radius:16px;overflow:hidden;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.scard-hd{display:flex;align-items:center;gap:10px;padding:14px 14px 12px}
.sbar{width:4px;height:44px;border-radius:3px;flex-shrink:0}
.sinfo{flex:1;min-width:0}
.sname{font-size:18px;font-weight:800;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ssub{font-size:12px;color:#aaa;margin-top:3px}
.lbadge{background:#E53935;color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px}
.ring-w{text-align:center;flex-shrink:0}
.ring-sc{font-size:17px;font-weight:900}
.ring-lb{font-size:10px;color:#aaa;margin-top:1px}
.slist{border-top:1px solid #f5f5f5}
.srow{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid #fafafa;gap:10px;cursor:pointer;transition:background .1s}
.srow:active{background:#f8f8f8}
.srk{font-size:15px;width:26px;text-align:center;flex-shrink:0}
.sn{flex:1;font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr{text-align:right;flex-shrink:0}
.sp{font-size:13px;color:#555}.sc{font-size:16px;font-weight:900}.sa{font-size:11px;color:#bbb;margin-top:1px}
.mbtn{width:100%;border:none;background:#f9f9f9;color:#888;font-size:12px;padding:10px;cursor:pointer}
.vrow{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .1s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.vrow:active{background:#fafafa}
.vrk{font-size:13px;font-weight:700;color:#ccc;width:22px;flex-shrink:0}
.vi{flex:1;min-width:0}.vn{font-size:15px;font-weight:700}
.vsec{font-size:11px;margin-top:2px;font-weight:600}.va{font-size:11px;color:#bbb;margin-top:1px}
.vr{text-align:right;flex-shrink:0}.vc{font-size:16px;font-weight:900}
.vp{font-size:12px;color:#888;margin-top:2px}
.spin{text-align:center;padding:60px 20px}
.spinner{width:32px;height:32px;border:3px solid #f0f0f0;border-top-color:#E53935;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px 24px;color:#888}
.foot{font-size:11px;color:#ccc;text-align:center;padding:16px 0 8px;line-height:1.9}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.show{opacity:1;pointer-events:all}
.bs{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;background:#fff;border-radius:24px 24px 0 0;z-index:201;transition:transform .3s cubic-bezier(.32,0,.14,1);max-height:90vh;overflow-y:auto;padding-bottom:32px}
.bs.show{transform:translateX(-50%) translateY(0)}
.bs-handle{width:40px;height:4px;background:#e0e0e0;border-radius:2px;margin:12px auto 0}
.bs-close{position:absolute;top:14px;right:16px;width:30px;height:30px;border:none;background:#f5f5f5;border-radius:50%;font-size:16px;cursor:pointer;color:#888;display:flex;align-items:center;justify-content:center}
.bs-hd{padding:20px 20px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.bs-nm{font-size:22px;font-weight:900;letter-spacing:-.5px}
.bs-cd{font-size:12px;color:#aaa;margin-top:3px}
.bs-sec{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;margin-top:6px}
.bs-pw{text-align:right;flex-shrink:0}
.bs-pr{font-size:24px;font-weight:900}
.bs-ch{font-size:16px;font-weight:800;margin-top:2px}
.bs-am{font-size:12px;color:#aaa;margin-top:4px}
.bs-metrics{padding:0 20px 16px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mc{background:#F8F9FC;border-radius:14px;padding:12px 14px}
.mc-lb{font-size:11px;color:#888;font-weight:600;margin-bottom:8px}
.mc-vl{font-size:22px;font-weight:900}
.mc-bw{height:5px;background:#E8E9EF;border-radius:3px;margin-top:8px;overflow:hidden}
.mc-bf{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.34,1.56,.64,1)}
.mc-ds{font-size:11px;color:#aaa;margin-top:5px}
.bs-sec2{padding:0 20px 16px}
.bs-st{font-size:13px;font-weight:800;color:#333;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.ci{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#F8F9FC;border-radius:10px;margin-bottom:6px}
.ci-ic{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.ci-ic.pass{background:#E53935;color:#fff}.ci-ic.fail{background:#eee;color:#bbb}
.ci-tx{font-size:13px;font-weight:600}.ci-nt{font-size:11px;color:#aaa}
.nws-btn{display:flex;align-items:center;gap:8px;padding:12px 14px;background:#F8F9FC;border-radius:12px;border:none;cursor:pointer;width:100%;text-decoration:none;color:inherit;margin-bottom:8px;transition:background .1s}
.nws-btn:active{background:#eee}
.bt-card{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.bt-hdr{display:grid;grid-template-columns:56px 1fr 42px 50px 30px;gap:4px;padding:8px 14px;background:#fafafa;border-bottom:1px solid #f0f0f0;font-size:11px;color:#aaa;font-weight:600}
.bt-rw{display:grid;grid-template-columns:56px 1fr 42px 50px 30px;gap:4px;padding:8px 14px;border-bottom:.5px solid #f8f8f8;font-size:12px;align-items:center}
.tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700}
.tu{background:#fdecea;color:#c0392b}.td{background:#e8f0fe;color:#1a56db}
.sp-row{display:grid;grid-template-columns:68px 1fr 40px 50px 24px;gap:5px;align-items:center;padding:7px 14px;border-bottom:.5px solid #f5f5f5;font-size:12px}
.sp-bw{height:7px;background:#f0f0f0;border-radius:99px;overflow:hidden}
.sp-bf{height:100%;border-radius:99px}
</style>
</head><body>
<div class="app">
<div class="hd"><div class="hd-in"><div class="hd-top"><div><div class="hd-ttl">주도섹터</div><div class="hd-sub" id="hsub"><span class="live"></span>로딩중...</div></div><button class="rbtn" id="rbtn" onclick="load()">🔄 새로고침</button></div><div class="tabs"><button class="tab on" onclick="st('s',this)">🔥 섹터</button><button class="tab" onclick="st('v',this)">💰 거래대금</button><button class="tab" onclick="st('r',this)">📈 등락률</button><button class="tab" onclick="st('b',this)">📊 백테스트</button></div></div></div>
<div class="cnt"><div id="ts"><div class="spin"><div class="spinner"></div><div style="color:#aaa;font-size:13px">한투API 로딩중...</div></div></div><div id="tv" style="display:none"></div><div id="tr" style="display:none"></div><div id="tb" style="display:none"><div class="spin"><div class="spinner"></div><div style="color:#aaa;font-size:13px">백테스트 데이터 로딩중...</div></div></div></div></div>
<div class="overlay" id="ovl" onclick="closeBS()"></div>
<div class="bs" id="bsht"><div class="bs-handle"></div><button class="bs-close" onclick="closeBS()">✕</button><div id="bsCnt"></div></div><script>
const API='https://sector-api-v8mg-ashy.vercel.app/api/market-data';
const HIST='https://sector-api-v8mg-ashy.vercel.app/api/history';
const SM={'삼성전자':'반도체','SK하이닉스':'반도체','한미반도체':'반도체장비','삼성전기':'반도체장비','리노공업':'반도체장비','원익IPS':'반도체장비','피에스케이':'반도체장비','HPSP':'반도체장비','이오테크닉스':'반도체장비','LG에너지솔루션':'2차전지','삼성SDI':'2차전지','에코프로':'2차전지','에코프로비엠':'2차전지','포스코퓨처엠':'2차전지','엘앤에프':'2차전지','체발POSCO홀딩스':'2차전지','레이저쓸':'2차전지','한화에어로스페이스':'방산','LIG넥스원':'방산','현대로텐':'방산','퍼스텍':'방산','빅텍':'방산','한화시스템':'방산','SNT모티브':'방산','풍산':'방산','HD현대중공업':'조선','삼성중공업':'조선','한화오션':'조선','HD한국조선해양':'조선','현대미포조선':'조선','현대차':'자동차','기아':'자동차','현대모비스':'자동차','현대건설':'건설','대우건설':'건설','GS건설':'건설','삼성물산':'건설','현대제철':'철강','금강철강':'철강','고려아연':'철강','삼성바이오로직스':'바이오','셀트리온':'바이오','유한양행':'바이오','HLB':'바이오','두산에너빌리티':'원전','한전KPS':'원전','HD현대일렉트릭':'전력기기','효성중공업':'전력기기','LS일렉트릭':'전력기긲','대한항공':'항공','제주항공':'항공','KB금융':'금융','신한지주':'금융','하나금융지주':'금융','구의AI':'IT/AI','NAVER':'IT/AI','카카오':'IT/AI','에스엠':'엔터','HYBE':'엔터'};
const SC={'반도체':'#5B8DEF','반도체장비':'#3B6FDE','2차전지':'#16a34a','조선':'#26A69A','방산':'#EF5350','자동차':'#FF8A65','건설':'#F5A623','철강':'#8D6E63','바이오':'#AB47BC','원전':'#26C6DA','금융':'#42A5F5','IT/AI':'#7E57C2','전력기기':'#FFCA28','항공':'#66BB6A','엔터':'#EC407A'};function gS(n){if(SM[n])return SM[n];for(const[k,v]of Object.entries(SM))if(n.includes(k)||k.includes(n))return v;return null}
function mo(ss){const li=ss.some(x=>x.isLimit)?30:0;const avg=ss.reduce((t,x)=>t+x.change,0)/ss.length;const mx=Math.max(...ss.map(x=>x.amt||0));return Math.round(Math.min(Math.min(avg*4,40)+Math.min(mx/5e11,1)*30+li,100))}
function mL(n){return n>=80?'매우강함':n>=60?'강함':n>=40?'보통':'약함'}
function mC(n){return n>=80?'#E53935':n>=60?'#FF7043':n>=40?'#FF9800':'#aaa'}
let allS=[],secMap={};
function st(t,b){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));b.classList.add('on');['s','v','r','b'].forEach(id=>document.getElementById('t'+id).style.display=t===id?'block':'none')}
async function load(){const btn=document.getElementById('rbtn');btn.disabled=true;btn.textContent='⏳';document.getElementById('ts').innerHTML='<div class="spin"><div class="spinner"></div><div style="color:#aaa;font-size:13px">한투API 로딩중...</div></div>';
try{const res=await fetch(API+'?t='+Date.now());const d=await res.json();if(!d.ok)throw new Error(d.error||'API오류');
const seen=new Set();allS=[];for(const s of[...(d.limitUp||[]),...(d.topRising||[]),...(d.topVolume||[])]){if(!seen.has(s.code)){seen.add(s.code);allS.push(s);}}
secMap={};for(const s of allS){const sec=gS(s.name);if(sec){if(!secMap[sec])secMap[sec]=[];secMap[sec].push(s);}}
const now=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
document.getElementById('hsub').innerHTML=`<span class="live"></span>${d.date}·${d.debug?.kospi||0}+${d.debug?.kosdaq||0}·${now}`;
rS(d);rV(d);rR(d);
if(d._token)rH(d._token);else{try{const r=await fetch(HIST+'?t='+Date.now());const hd=await r.json();if(hd.ok)rB(hd);}catch(e){}}
}catch(e){document.getElementById('ts').innerHTML=`<div style="background:#fff3e0;border-radius:14px;padding:16px;color:#e65100">⚠️ ${e.message}</div>`;}
btn.disabled=false;btn.textContent='🔄 새로고침';}
async function rH(tk){try{const r=await fetch(HIST+'?token='+encodeURIComponent(tk)+'&t='+Date.now());const d=await r.json();if(d.ok)rB(d);}catch(e){}}function rS(d){const ri=allS.filter(s=>s.change>0);const lc=(d.limitUp||[]).length;const tv=d.topVolume||[];const avg=tv.length?tv.reduce((a,s)=>a+s.change,0)/tv.length:0;const mood=avg>0.3?'상승세':avg<-0.3?'하락세':'혼조세';const mc=avg>0.3?'up':avg<-0.3?'dn':'fl';
const secs=Object.entries(secMap).map(([nm,ss])=>{const rs=[...ss].filter(s=>s.change>0).sort((a,b)=>b.isLimit-a.isLimit||b.change-a.change);if(!rs.length)return null;const m=mo(rs);return{nm,ss:rs,m,c:SC[nm]||'#9E9E9E',hl:rs.some(s=>s.isLimit)};}).filter(Boolean).filter(s=>s.m>0).sort((a,b)=>b.m-a.m);
let h=`<div class="stat-row"><div class="stat"><div class="sl">장 분위기</div><div class="sv ${mc}">${mood}</div></div><div class="stat"><div class="sl">상승 종목</div><div class="sv up">${ri.length}개</div></div><div class="stat"><div class="sl">상한가</div><div class="sv ${lc>0?'up':'fl'}">${lc}개</div></div></div>`;
if(!secs.length){h+=`<div class="empty"><div style="font-size:36px;margin-bottom:12px">📉</div><div style="font-size:16px;font-weight:700;color:#555">주도섹터 없음</div></div>`;}else{h+=`<div class="sec-hd">상승 주도섹터 <span class="pill">${secs.length}개</span></div>`;for(const sec of secs){const ci=2*Math.PI*22,pr=(sec.m/100)*ci,mc2=mC(sec.m);let rows='';['🥇','🥈','🥉'].forEach((md,i)=>{if(sec.ss[i])rows+=sRow(sec.ss[i],sec.ss[i].isLimit?'🔴':md);});let more='';const rest=sec.ss.slice(3);if(rest.length){more=`<button class="mbtn" onclick="toggleMore(this)">▼ +${rest.length}종목 더보기</button><div style="display:none">`;rest.forEach(s=>{more+=sRow(s,'·');});more+='</div>';}
h+=`<div class="scard"><div class="scard-hd"><div class="sbar" style="background:${sec.c}"></div><div class="sinfo"><div class="sname">${sec.nm}${sec.hl?'<span class="lbadge">상한가</span>':''}</div><div class="ssub">${sec.ss.length}종목·${mL(sec.m)}</div></div><div class="ring-w"><svg width="54" height="54" viewBox="0 0 54 54" style="transform:rotate(-90deg)"><circle cx="27" cy="27" r="22" fill="none" stroke="#f0f0f0" stroke-width="4"/><circle cx="27" cy="27" r="22" fill="none" stroke="${mc2}" stroke-width="4" stroke-dasharray="${ci.toFixed(1)}" stroke-dashoffset="${(ci-pr).toFixed(1)}" stroke-linecap="round"/></svg><div style="margin-top:-38px;margin-bottom:6px"><div class="ring-sc" style="color:${mc2}">${sec.m}</div></div><div class="ring-lb">${mL(sec.m)}</div></div></div><div class="slist">${rows}${more}</div></div>`;}
}h+=`<div class="foot">한국투자증권 OpenAPI</div>`;document.getElementById('ts').innerHTML=h;}
function sRow(s,rk){const cc=s.change>0?'up':s.change<0?'dn':'fl';const cs=(s.change>0?'+':'')+s.change.toFixed(2)+'%';return `<div class="srow" onclick="showStock('${s.code}')"><span class="srk">${rk}</span><span class="sn">${s.name}</span><div class="sr"><div class="sp">${s.price.toLocaleString()}원</div><div class="sc ${cc}">${cs}</div>${s.amtFmt?`<div class="sa">${s.amtFmt}</div>`:''}</div></div>`;}
function rV(d){const lst=(d.topVolume||[]).slice(0,40);let h=`<div class="sec-hd">거래대금 상위 <span class="pill">${lst.length}개</span></div>`;lst.forEach((s,i)=>{const sec=gS(s.name)||'기타',sc2=SC[sec]||'#ccc';const cc=s.change>0?'up':s.change<0?'dn':'fl';const cs=(s.change>0?'+':'')+s.change.toFixed(2)+'%';h+=`<div class="vrow" onclick="showStock('${s.code}')"><div class="vrk">${i+1}</div><div class="vi"><div class="vn">${s.name}${s.isLimit?' 🔴':''}</div><div class="vsec" style="color:${sc2}">● ${sec}</div><div class="va">${s.amtFmt}</div></div><div class="vr"><div class="vc ${cc}">${cs}</div><div class="vp">${s.price.toLocaleString()}원</div></div></div>`;});h+=`<div class="foot">거래대금 내림차순</div>`;document.getElementById('tv').innerHTML=h;}
function rR(d){const seen=new Set(),lst=[];for(const s of[...(d.limitUp||[]),...(d.topRising||[]),...(d.topVolume||[]).filter(x=>x.change>0)]){if(!seen.has(s.code)&&s.change>0){seen.add(s.code);lst.push(s);}}lst.sort((a,b)=>b.isLimit-a.isLimit||b.change-a.change);let h=`<div class="sec-hd">등락률 상위 <span class="pill">${lst.length}개</span></div>`;if(!lst.length){h+=`<div class="empty">상승 종목 없음</div>`;}else{lst.slice(0,50).forEach((s,i)=>{const sec=gS(s.name)||'기타',sc2=SC[sec]||'#ccc';h+=`<div class="vrow" onclick="showStock('${s.code}')"><div class="vrk">${i+1}</div><div class="vi"><div class="vn">${s.name}${s.isLimit?' 🔴':''}</div><div class="vsec" style="color:${sc2}">● ${sec}</div><div class="va">${s.amtFmt}</div></div><div class="vr"><div class="vc up">+${s.change.toFixed(2)}%</div><div class="vp">${s.price.toLocaleString()}원</div></div></div>`;});}h+=`<div class="foot">상한가 우선·등락률 내림차순</div>`;document.getElementById('tr').innerHTML=h;}function rB(d){const bt=d.backtest||[];const vl=bt.filter(x=>x.topSector&&x.nextDayReturn!==null);const won=vl.filter(x=>x.nextDayReturn>0);const lost=vl.filter(x=>x.nextDayReturn<=0);const wr=vl.length?Math.round(won.length/vl.length*100):0;const tavg=vl.length?vl.reduce((a,x)=>a+x.nextDayReturn,0)/vl.length:0;const aw=won.length?won.reduce((a,x)=>a+x.nextDayReturn,0)/won.length:0;const al=lost.length?lost.reduce((a,x)=>a+x.nextDayReturn,0)/lost.length:0;const fp=n=>(n>=0?'+':'')+n.toFixed(2)+'%';
const sm={};for(const x of bt){if(!x.topSector||x.nextDayReturn===null)continue;if(!sm[x.topSector])sm[x.topSector]={w:0,t:0,s:0};sm[x.topSector].t++;sm[x.topSector].s+=x.nextDayReturn;if(x.nextDayReturn>0)sm[x.topSector].w++;}
const ss=Object.entries(sm).map(([s,v])=>({s,wr:Math.round(v.w/v.t*100),avg:+(v.s/v.t).toFixed(2),n:v.t})).sort((a,b)=>b.wr-a.wr);
let h=`<div class="stat-row"><div class="stat"><div class="sl">분석기간</div><div class="sv" style="font-size:13px">${d.from?.slice(2,6)}.${d.from?.slice(6)}~${d.to?.slice(4,6)}.${d.to?.slice(6)}</div></div><div class="stat"><div class="sl">전체승률</div><div class="sv up">${wr}%</div><div style="font-size:11px;color:#aaa">${won.length}승 ${lost.length}패</div></div><div class="stat"><div class="sl">평균수익</div><div class="sv ${tavg>=0?'up':'dn'}">${fp(tavg)}</div></div></div><div class="stat-row"><div class="stat"><div class="sl">승시평균</div><div class="sv up">+${aw.toFixed(2)}%</div></div><div class="stat"><div class="sl">패시평균</div><div class="sv dn">${al.toFixed(2)}%</div></div><div class="stat"><div class="sl">분석일수</div><div class="sv">${vl.length}일</div></div></div><div class="sec-hd">섹터별 성과 <span class="pill">${ss.length}개</span></div><div class="bt-card">`;
for(const s of ss){const fl=s.wr>=60?'#E53935':s.wr>=40?'#FF9800':'#2563a8';h+=`<div class="sp-row"><span style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.s}</span><div class="sp-bw"><div class="sp-bf" style="width:${s.wr}%;background:${fl}"></div></div><span style="font-weight:800;color:${fl}">${s.wr}%</span><span style="color:${s.avg>=0?'#E53935':'#2563a8'};font-weight:700">${fp(s.avg)}</span><span style="color:#aaa">${s.n}회</span></div>`;}
h+=`</div><div class="sec-hd">거래로그 <span class="pill">최신순</span></div><div class="bt-card"><div class="bt-hdr"><span>날짜</span><span>섹터</span><span>당일%</span><span style="text-align:right">다음날</span><span style="text-align:center">결과</span></div><div style="max-height:300px;overflow-y:auto">`;
for(const x of[...bt].reverse()){if(!x.topSector)continue;const hr=x.nextDayReturn!==null,w=hr&&x.nextDayReturn>0;const ds=x.date?x.date.slice(4,6)+'.'+x.date.slice(6):'';h+=`<div class="bt-rw"><span style="color:#aaa">${ds}</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#555">${x.topSector}</span><span style="color:#E53935;font-weight:700">+${(x.leaderChange||0).toFixed(1)}%</span><span style="text-align:right;font-weight:700;color:${hr?(w?'#E53935':'#2563a8'):'#ccc'}">${hr?fp(x.nextDayReturn):'-'}</span><span style="text-align:center">${hr?`<span class="tag ${w?'tu':'td'}">${w?'승':'패'}</span>`:'-'}</span></div>`;}
h+=`</div></div><div class="foot">한국투자증권 OpenAPI · 실제종가 기준</div>`;document.getElementById('tb').innerHTML=h;}function showStock(code){const s=allS.find(x=>x.code===code);if(!s)return;const sec=gS(s.name)||'기타';const sc2=SC[sec]||'#888';const secSs=(secMap[sec]||[]).filter(x=>x.change>0);const ki=cKi(s,secSs),mat=cMat(s,secSs),thm=cThm(sec,secSs),vol=cVol(s);const kiL=ki>=80?'핵🔥':ki>=60?'강세':ki>=40?'주목':'관망';const matL=mat>=80?'강한재료':mat>=60?'유효재료':mat>=40?'보통':'약함';const thmL=thm>=80?'섹터열풍':thm>=60?'강한테마':thm>=40?'보통':'약함';const volL=vol>=80?'폭발':vol>=60?'강함':vol>=40?'보통':'약함';const checks=cCL(s,secSs,sec);const pass=checks.filter(c=>c.p).length;const cc=s.change>0?'up':s.change<0?'dn':'fl';const cs=(s.change>0?'+':'')+s.change.toFixed(2)+'%';
let h=`<div class="bs-hd"><div><div class="bs-nm">${s.name}</div><div class="bs-cd">${s.code}</div><span class="bs-sec" style="background:${sc2}20;color:${sc2}">${sec}</span></div><div class="bs-pw"><div class="bs-pr">${s.price.toLocaleString()}<span style="font-size:14px;font-weight:600;color:#888">원</span></div><div class="bs-ch ${cc}">${cs}</div><div class="bs-am">${s.amtFmt||''}</div></div></div>
<div class="bs-metrics">${mCard('끔점수',ki,kiL,mC(ki),'모멘텀·강도')}${mCard('재료강도',mat,matL,mC(mat),'상승재료')}${mCard('섹터테마',thm,thmL,mC(thm),'테마강도')}${mCard('거래강도',vol,volL,mC(vol),'거래대금')}</div>
<div class="bs-sec2"><div class="bs-st">✅ 종가매수 체크리스트 <span style="font-size:12px;color:${pass>=4?'#E53935':pass>=3?'#FF9800':'#888'};font-weight:700">${pass}/5 통과</span></div>`;
for(const c of checks){h+=`<div class="ci"><div class="ci-ic ${c.p?'pass':'fail'}">${c.p?'✓':'✗'}</div><div style="flex:1"><div class="ci-tx" style="color:${c.p?'#111':'#aaa'}">${c.l}</div><div class="ci-nt">${c.n}</div></div></div>`;}
h+=`</div><div class="bs-sec2"><div class="bs-st">📰 관련뉴스·공시</div><a class="nws-btn" href="https://finance.naver.com/item/news.naver?code=${s.code}" target="_blank"><span style="font-size:20px">📊</span><span style="font-size:13px;font-weight:700;flex:1">${s.name}뉴스</span><span style="font-size:14px;color:#bbb">→</span></a><a class="nws-btn" href="https://dart.fss.or.kr/dsab001/main.do?autoSearch=true&textCrpNm=${encodeURIComponent(s.name)}" target="_blank"><span style="font-size:20px">📋</span><span style="font-size:13px;font-weight:700;flex:1">DART공시</span><span style="font-size:14px;color:#bbb">→</span></a><a class="nws-btn" href="https://finance.naver.com/item/main.naver?code=${s.code}" target="_blank"><span style="font-size:20px">📈</span><span style="font-size:13px;font-weight:700;flex:1">차트·재무분석</span><span style="font-size:14px;color:#bbb">→</span></a></div>`;
document.getElementById('bsCnt').innerHTML=h;document.getElementById('ovl').classList.add('show');document.getElementById('bsht').classList.add('show');}
function mCard(lb,sc,tx,cl,ds){return `<div class="mc"><div class="mc-lb">${lb}</div><div class="mc-vl" style="color:${cl}">${sc}</div><div class="mc-bw"><div class="mc-bf" style="width:${sc}%;background:${cl}"></div></div><div class="mc-ds">${tx}·${ds}</div></div>`;}
function cKi(s,ss){let sc=Math.min(Math.max(s.change*4,0),40);if(s.isLimit)sc+=30;sc+=Math.min((s.amt||0)/5e11,1)*20;if(ss.length>=3)sc+=10;return Math.round(Math.min(sc,100));}
function cMat(s,ss){let sc=Math.min(Math.max(s.change*3.5,0),35);if(s.isLimit)sc+=25;sc+=Math.min(ss.length*8,24);sc+=Math.min((s.amt||0)/1e12,1)*16;return Math.round(Math.min(sc,100));}
function cThm(sec,ss){if(!ss.length)return 10;const avg=ss.reduce((a,s)=>a+s.change,0)/ss.length;let sc=Math.min(avg*5,40)+Math.min(ss.length*10,40);if(ss.some(s=>s.isLimit))sc+=20;return Math.round(Math.min(sc,100));}
function cVol(s){return Math.round(Math.min(Math.min((s.amt||0)/1e12,1)*80+Math.min(Math.max(s.change,0)*2,20),100));}
function cCL(s,ss,sec){const isLdr=ss[0]?.code===s.code;return[{p:s.change>0,l:'양봉 상승 확인',n:s.change>0?`+${s.change.toFixed(2)}% 상승`:'하락'},{p:(s.amt||0)>=5e9,l:'거래대금 50억+',n:`${s.amtFmt||'0'} ${(s.amt||0)>=5e9?'✓':'✗'}`},{p:ss.length>=2,l:'섹터 동반상승',n:ss.length>=2?`${sec} ${ss.length}종목 동반`:'동반없음'},{p:s.change>=2,l:'강한등락률 2%+',n:`${s.change>=0?'+':''}${s.change.toFixed(2)}% ${s.change>=2?'✓':'✗'}`},{p:s.isLimit||isLdr,l:'주도주/상한가',n:s.isLimit?'상한가🔴':isLdr?`${sec} 1위대장주`:'추종주'}];}
function closeBS(){document.getElementById('ovl').classList.remove('show');document.getElementById('bsht').classList.remove('show');}
function toggleMore(btn){const el=btn.nextElementSibling;const show=el.style.display==='none';el.style.display=show?'block':'none';btn.textContent=show?'▲ 접기':`▼ +${el.querySelectorAll('.srow').length}종목`;}
load();
</script>
</body>
