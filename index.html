<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>주도섹터 대시보드</title><style>*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{font-family:-apple-system,sans-serif;background:#F2F3F7;color:#111}.app{max-width:480px;margin:0 auto}.hd{background:#fff;padding:14px 16px 0;position:sticky;top:0;z-index:100;border-bottom:1px solid #eee}.htop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}.htitle{font-size:22px;font-weight:900;letter-spacing:-0.8px}.hsub{font-size:12px;color:#aaa;margin-top:3px;display:flex;align-items:center;gap:5px}.live{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:blink 1.5s infinite}@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}.rbtn{background:#E53935;color:#fff;border:none;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer}.rbtn:disabled{background:#ccc}.tabs{display:flex;margin-top:2px}.tab{flex:1;padding:12px 0;border:none;background:transparent;font-size:13px;font-weight:600;color:#bbb;cursor:pointer;border-bottom:2.5px solid transparent}.tab.on{color:#111;border-bottom-color:#E53935}.content{padding:12px}.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}.stat{background:#fff;border-radius:12px;padding:12px}.sl{font-size:11px;color:#aaa;margin-bottom:3px}.sv{font-size:18px;font-weight:800}.up{color:#E53935}.dn{color:#1565C0}.fl{color:#888}.sec-hd{font-size:12px;color:#aaa;font-weight:700;padding:0 4px 8px;display:flex;justify-content:space-between;align-items:center}.pill{background:#111;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}.card{background:#fff;border-radius:16px;overflow:hidden;margin-bottom:10px}.card-hd{display:flex;align-items:center;gap:10px;padding:13px 14px}.cbar{width:4px;height:40px;border-radius:3px;flex-shrink:0}.cinfo{flex:1}.cname{font-size:17px;font-weight:800;display:flex;align-items:center;gap:7px;flex-wrap:wrap}.csub{font-size:12px;color:#aaa;margin-top:2px}.lbadge{background:#E53935;color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px}.ring-wrap{text-align:center}.score-n{font-size:16px;font-weight:900}.score-l{font-size:10px;color:#aaa;margin-top:1px}.slist{border-top:1px solid #f5f5f5}.srow{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid #fafafa;gap:10px}.srk{font-size:16px;width:24px;text-align:center;flex-shrink:0}.sn{flex:1;font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sr{text-align:right;flex-shrink:0}.sp{font-size:13px;color:#555}.sc{font-size:15px;font-weight:900}.sa{font-size:11px;color:#ccc;margin-top:1px}.mbtn{width:100%;border:none;background:#f9f9f9;color:#888;font-size:13px;padding:10px;cursor:pointer}.vrow{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px}.vrk{font-size:13px;font-weight:700;color:#ccc;width:22px}.vi{flex:1}.vn{font-size:15px;font-weight:700}.vs{font-size:11px;margin-top:2px}.va{font-size:11px;color:#ccc;margin-top:1px}.vr{text-align:right;flex-shrink:0}.vc{font-size:16px;font-weight:900}.vp{font-size:13px;color:#777;margin-top:1px}.empty{text-align:center;padding:48px 24px;color:#888}.spin{text-align:center;padding:60px}.spinner{width:36px;height:36px;border:3px solid #f0f0f0;border-top-color:#E53935;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}@keyframes spin{to{transform:rotate(360deg)}}.footer{font-size:11px;color:#ccc;text-align:center;padding:16px 0 32px;line-height:1.9}.bt-card{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px}.bt-row{display:grid;grid-template-columns:62px 76px 1fr 52px 52px 32px;gap:5px;padding:5px 0;border-bottom:.5px solid #f5f5f5;font-size:12px;align-items:center}.tag{display:inline-block;font-size:10px;padding:2px 6px;border-radius:20px;font-weight:700}.tu{background:#fdecea;color:#c0392b}.td{background:#e8f0fe;color:#1a56db}</style></head><body><div class="app"><div class="hd"><div class="htop"><div><div class="htitle">주도섹터</div><div class="hsub" id="sub"><span class="live"></span>로딩중...</div></div><button class="rbtn" id="rbtn" onclick="load()">🔄 새로고침</button></div><div class="tabs"><button class="tab on" onclick="st('s',this)">🔥 섹터</button><button class="tab" onclick="st('v',this)">💰 거래대금</button><button class="tab" onclick="st('r',this)">📈 등락률</button><button class="tab" onclick="st('b',this)">📊 백테스트</button></div></div><div class="content"><div id="ts"><div class="spin"><div class="spinner"></div><div style="color:#aaa;font-size:13px">한투API 로딩중...</div></div></div><div id="tv" style="display:none"></div><div id="tr" style="display:none"></div><div id="tb" style="display:none"></div></div></div><script>const A='https://sector-api-v8mg-ashy.vercel.app/api/market-data',H='https://sector-api-v8mg-ashy.vercel.app/api/history';const SM={"삼성전자":"반도체","삼성전자우":"반도체","SK하이닉스":"반도체","한미반도체":"반도체장비","삼성전기":"반도체장비","LG에너지솔루션":"2차전지","삼성SDI":"2차전지","에코프로":"2차전지","한화에어로스페이스":"방산","LIG넥스원":"방산","현대로템":"방산","퍼스텍":"방산","HD현대중공업":"조선","삼성중공업":"조선","한화오션":"조선","HD한국조선해양":"조선","현대차":"자동차","기아":"자동차","현대모비스":"자동차","현대건설":"건설","대우건설":"건설","GS건설":"건설","삼성물산":"건설","POSCO홀딩스":"철강","현대제철":"철강","금강철강":"철강","고려아연":"철강","삼성바이오로직스":"바이오","셀트리온":"바이오","두산에너빌리티":"원전","HD현대일렉트릭":"전력기기","효성중공업":"전력기기","LS일렉트릭":"전력기기","대한항공":"항공","제주항공":"항공","KB금융":"금융","신한지주":"금융","하나금융지주":"금융","미래에셋증권":"증권","NAVER":"IT/AI","카카오":"IT/AI","한국전력":"에너지"};const SC={"반도체":"#5B8DEF","반도체장비":"#4A7FDE","2차전지":"#22c55e","조선":"#26A69A","방산":"#E57373","자동차":"#FF8A65","건설":"#F5A623","철강":"#8D6E63","바이오":"#AB47BC","원전":"#26C6DA","금융":"#42A5F5","IT/AI":"#7E57C2","전력기기":"#FFCA28","항공":"#66BB6A","에너지":"#FF7043"};function so(n){if(SM[n])return SM[n];for(const[k,v]of Object.entries(SM))if(n.includes(k)||k.includes(n))return v;return null}function mm(s){const l=s.some(x=>x.isLimit),a=s.reduce((t,x)=>t+x.change,0)/s.length,m=Math.max(...s.map(x=>x.amt||0));return Math.round(Math.min(Math.max(a*3,0),100)*.5+Math.min(m/5e11,1)*100*.3+(l?100:0)*.2)}function ml(n){return n>=80?"매우강함":n>=60?"강함":n>=40?"보통":"약함"}function mc(n){return n>=80?"#E53935":n>=60?"#FF7043":n>=40?"#FF9800":"#aaa"}function st(t,btn){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');['s','v','r','b'].forEach(id=>document.getElementById('t'+id).style.display=t===id?'block':'none')}async function load(){const btn=document.getElementById('rbtn');btn.disabled=true;btn.textContent='⏳';document.getElementById('ts').innerHTML='<div class="spin"><div class="spinner"></div><div style="color:#aaa;font-size:13px">한투API 로딩중...</div></div>';try{const r=await fetch(A+'?t='+Date.now());const d=await r.json();if(d.ok){const t=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});document.getElementById('sub').innerHTML='<span class="live"></span>'+d.date+' · 한투API · '+t+' · 코스피'+(d.debug?.kospi||0)+'+코스닥'+(d.debug?.kosdaq||0);rS(d);rV(d);rR(d);if(d._token)fH(d._token);}else err(d.error);}catch(e){err(e.message);}btn.disabled=false;btn.textContent='🔄 새로고침';}async function fH(tk){try{const r=await fetch(H+'?token='+encodeURIComponent(tk));const d=await r.json();if(d.ok)rB(d);}catch(e){}}function err(m){document.getElementById('ts').innerHTML='<div style="background:#fff3e0;border-radius:14px;padding:16px;color:#e65100">⚠️ '+m+'</div>';}function rS(d){const all=[...(d.limitUp||[]),...(d.topRising||[]),...(d.topVolume||[])];const seen=new Set(),map={};all.forEach(s=>{if(s.change<=0||seen.has(s.code))return;seen.add(s.code);const sec=so(s.name);if(!sec)return;if(!map[sec])map[sec]=[];map[sec].push(s);});const secs=Object.entries(map).map(([n,st])=>{const sorted=[...st].sort((a,b)=>{if(b.isLimit!==a.isLimit)return b.isLimit?1:-1;return b.change-a.change;});return{n,st:sorted,m:mm(sorted),c:SC[n]||'#9E9E9E',l:sorted.some(s=>s.isLimit)};}).filter(s=>s.m>0).sort((a,b)=>b.m-a.m);const tv=d.topVolume||[];const ri=tv.filter(s=>s.change>0);const avg=tv.reduce((a,s)=>a+s.change,0)/(tv.length||1);const md=avg>0.3?'상승세':avg<-0.3?'하락세':'혼조세';const mdc=avg>0.3?'up':avg<-0.3?'dn':'fl';let h='<div class="stat-row"><div class="stat"><div class="sl">장 분위기</div><div class="sv '+mdc+'">'+md+'</div></div><div class="stat"><div class="sl">상승 종목</div><div class="sv up">'+ri.length+'개</div></div><div class="stat"><div class="sl">상한가</div><div class="sv '+(d.limitUp?.length>0?'up':'fl')+'">'+((d.limitUp||[]).length)+'개</div></div></div>';if(!secs.length){h+='<div class="empty"><div style="font-size:36px;margin-bottom:12px">📉</div><div style="font-size:16px;font-weight:700;color:#555">주도섹터 없음</div><div style="font-size:13px;color:#aaa;margin-top:6px">전반적 하락장</div></div>';}else{h+='<div class="sec-hd">상승 주도섹터 <span class="pill">'+secs.length+'개</span></div>';secs.forEach(sec=>{const ci=2*Math.PI*22,pr=(sec.m/100)*ci,mc2=mc(sec.m);let sl='';const med=['🥇','🥈','🥉'];sec.st.slice(0,3).forEach((s,i)=>{sl+='<div class="srow"><span class="srk">'+(s.isLimit?'🔴':med[i]||'·')+'</span><span class="sn">'+s.name+'</span><div class="sr"><div class="sp">'+s.price.toLocaleString()+'원</div><div class="sc up">+'+s.change.toFixed(2)+'%</div>'+(s.amtFmt?'<div class="sa">'+s.amtFmt+'</div>':'')+'</div></div>';});const rest=sec.st.slice(3);let more='';if(rest.length){more='<button class="mbtn" onclick="tm(this)">▼ +'+rest.length+'종목</button><div style="display:none">';rest.forEach(s=>{more+='<div class="srow"><span class="srk">·</span><span class="sn">'+s.name+'</span><div class="sr"><div class="sp">'+s.price.toLocaleString()+'원</div><div class="sc up">+'+s.change.toFixed(2)+'%</div></div></div>';});more+='</div>';}h+='<div class="card"><div class="card-hd"><div class="cbar" style="background:'+sec.c+'"></div><div class="cinfo"><div class="cname">'+sec.n+(sec.l?'<span class="lbadge">상한가</span>':'')+'</div><div class="csub">'+sec.st.length+'종목 · '+ml(sec.m)+'</div></div><div class="ring-wrap"><svg width="54" height="54" viewBox="0 0 54 54" style="transform:rotate(-90deg)"><circle cx="27" cy="27" r="22" fill="none" stroke="#f0f0f0" stroke-width="4"/><circle cx="27" cy="27" r="22" fill="none" stroke="'+mc2+'" stroke-width="4" stroke-dasharray="'+ci.toFixed(1)+'" stroke-dashoffset="'+(ci-pr).toFixed(1)+'" stroke-linecap="round"/></svg><div style="margin-top:-38px;margin-bottom:6px"><div class="score-n" style="color:'+mc2+'">'+sec.m+'</div></div><div class="score-l">'+ml(sec.m)+'</div></div></div><div class="slist">'+sl+more+'</div></div>';});}h+='<div class="footer">출처: 한국투자증권 OpenAPI · 코스피+코스닥</div>';document.getElementById('ts').innerHTML=h;}function rV(d){const lst=(d.topVolume||[]).slice(0,40);let h='<div class="sec-hd">거래대금 상위 <span class="pill">'+lst.length+'개</span></div>';lst.forEach((s,i)=>{const sec=so(s.name)||'기타',sc2=SC[sec]||'#ccc';h+='<div class="vrow"><div class="vrk">'+(i+1)+'</div><div class="vi"><div class="vn">'+s.name+(s.isLimit?' 🔴':'')+'</div><div class="vs" style="color:'+sc2+'">● '+sec+'</div><div class="va">'+s.amtFmt+'</div></div><div class="vr"><div class="vc '+(s.change>0?'up':s.change<0?'dn':'fl')+'">'+(s.change>0?'+':'')+s.change.toFixed(2)+'%</div><div class="vp">'+s.price.toLocaleString()+'원</div></div></div>';});h+='<div class="footer">거래대금 내림차순</div>';document.getElementById('tv').innerHTML=h;}function rR(d){const lst=(d.topRising||[]).slice(0,40);let h='<div class="sec-hd">등락률 상위 <span class="pill">'+lst.length+'개</span></div>';if(!lst.length){h+='<div class="empty"><div style="font-size:28px;margin-bottom:10px">📉</div><div style="font-weight:700;color:#555">상승 종목 없음</div></div>';}else lst.forEach((s,i)=>{const sec=so(s.name)||'기타',sc2=SC[sec]||'#ccc';h+='<div class="vrow"><div class="vrk">'+(i+1)+'</div><div class="vi"><div class="vn">'+s.name+(s.isLimit?' 🔴':'')+'</div><div class="vs" style="color:'+sc2+'">● '+sec+'</div><div class="va">'+s.amtFmt+'</div></div><div class="vr"><div class="vc up">+'+s.change.toFixed(2)+'%</div><div class="vp">'+s.price.toLocaleString()+'원</div></div></div>';});h+='<div class="footer">상한가 우선 · 등락률 내림차순</div>';document.getElementById('tr').innerHTML=h;}function rB(d){const bt=d.backtest||[],wN=bt.filter(x=>x.nextDayReturn!==null),won=wN.filter(x=>x.nextDayReturn>0),wr=wN.length?Math.round(won.length/wN.length*100):0,aW=won.length?(won.reduce((a,x)=>a+x.nextDayReturn,0)/won.length).toFixed(2):'0',lost=wN.filter(x=>x.nextDayReturn<=0),aL=lost.length?(lost.reduce((a,x)=>a+x.nextDayReturn,0)/lost.length).toFixed(2):'0';const sm={};bt.forEach(x=>{if(!x.topSector||x.nextDayReturn===null)return;if(!sm[x.topSector])sm[x.topSector]={w:0,t:0,s:0};sm[x.topSector].t++;sm[x.topSector].s+=x.nextDayReturn;if(x.nextDayReturn>0)sm[x.topSector].w++;});const ss=Object.entries(sm).map(([s,v])=>({s,wr:Math.round(v.w/v.t*100),avg:+(v.s/v.t).toFixed(2),n:v.t})).sort((a,b)=>b.wr-a.wr);let h='<div class="stat-row"><div class="stat"><div class="sl">분석 기간</div><div class="sv" style="font-size:15px">'+d.from+'~'+d.to.slice(4)+'</div></div><div class="stat"><div class="sl">전체 승률</div><div class="sv up">'+wr+'%</div><div style="font-size:11px;color:#aaa;margin-top:2px">'+won.length+'승 '+lost.length+'패</div></div><div class="stat"><div class="sl">평균수익</div><div class="sv '+(wN.reduce((a,x)=>a+x.nextDayReturn,0)/wN.length>=0?'up':'dn')+'">'+((wN.reduce((a,x)=>a+x.nextDayReturn,0)/wN.length)>=0?'+':'')+(wN.reduce((a,x)=>a+x.nextDayReturn,0)/wN.length).toFixed(2)+'%</div></div></div><div class="stat-row"><div class="stat"><div class="sl">승시 평균</div><div class="sv up">+'+aW+'%</div></div><div class="stat"><div class="sl">패시 평균</div><div class="sv dn">'+aL+'%</div></div><div class="stat"><div class="sl">분석 일수</div><div class="sv">'+wN.length+'일</div></div></div>';h+='<div class="sec-hd" style="margin-top:4px">섹터별 성과 <span class="pill">'+ss.length+'개</span></div><div class="bt-card">';ss.forEach(s=>{h+='<div style="display:grid;grid-template-columns:80px 1fr 48px 56px 32px;gap:6px;align-items:center;padding:7px 0;border-bottom:.5px solid #f5f5f5;font-size:13px"><span style="font-weight:600">'+s.s+'</span><div style="height:8px;background:#f0f0f0;border-radius:99px;overflow:hidden"><div style="height:100%;width:'+s.wr+'%;background:'+(s.wr>=60?'#E53935':s.wr>=40?'#FF9800':'#2563a8')+';border-radius:99px"></div></div><span style="font-weight:700;color:'+(s.wr>=60?'#E53935':s.wr>=40?'#FF9800':'#2563a8')+'">'+s.wr+'%</span><span style="color:'+(s.avg>=0?'#E53935':'#2563a8')+';font-weight:700">'+(s.avg>=0?'+':'')+s.avg+'%</span><span style="color:#aaa">'+s.n+'회</span></div>';});h+='</div><div class="sec-hd" style="margin-top:8px">거래 로그 <span class="pill">최신순</span></div><div class="bt-card" style="padding:0"><div class="bt-row" style="padding:6px 12px;border-bottom:1px solid #eee;font-size:11px;color:#aaa;font-weight:600"><span>날짜</span><span>섹터</span><span>대장주</span><span style="text-align:right">당일</span><span style="text-align:right">다음날</span><span style="text-align:center">결과</span></div><div style="max-height:320px;overflow-y:auto">';[...bt].reverse().forEach(x=>{if(!x.topSector)return;const has=x.nextDayReturn!==null,w=has&&x.nextDayReturn>0;h+='<div class="bt-row" style="padding:5px 12px"><span style="color:#aaa;font-size:11px">'+x.date.slice(4,6)+'.'+x.date.slice(6)+'</span><span style="color:#555;font-size:11px">'+x.topSector+'</span><span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px">'+x.leader+'</span><span style="text-align:right;color:#E53935;font-size:12px;font-weight:600">+'+(x.leaderChange||0).toFixed(1)+'%</span><span style="text-align:right;font-size:12px;font-weight:600;color:'+(has?(w?'#E53935':'#2563a8'):'#ccc')+'">'+(has?((x.nextDayReturn>0?'+':'')+x.nextDayReturn.toFixed(1)+'%'):'-')+'</span><span style="text-align:center">'+(has?'<span class="tag '+(w?'tu':'td')+'">'+(w?'승':'패')+'</span>':'-')+'</span></div>';});h+='</div></div><div class="footer">한국투자증권 OpenAPI · 실제 종가 기준</div>';document.getElementById('tb').innerHTML=h;}function tm(btn){const el=btn.nextElementSibling;const show=el.style.display==='none';el.style.display=show?'block':'none';btn.textContent=show?'▲ 접기':'▼ +'+(el.querySelectorAll('.srow').length)+'종목';}load();</script></body></html>
